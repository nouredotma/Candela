<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candela — Join</title>
    <meta name="description" content="Join the chatroom — pick a username, choose a room, and start chatting.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="join-page">

    <div class="join-container">
        <!-- Logo -->
        <div class="join-logo">
            <a href="/chat/general" class="text-decoration-none"><h1>Candela</h1></a>
            <p class="join-subtitle">Join a room and start chatting — no account needed.</p>
        </div>

        <!-- Error message -->
        {% if error %}
        <div class="error-banner">{{ error }}</div>
        {% endif %}

        <!-- Tab Bar -->
        <div class="tab-bar">
            <button class="tab-btn active" data-tab="guest">Join as Guest</button>
            <button class="tab-btn" data-tab="login">Login</button>
            <button class="tab-btn" data-tab="register">Create Account</button>
        </div>

        <!-- Tab 1: Guest Join Form -->
        <div id="tab-guest" class="tab-content active">
            <div class="join-section">
                <form action="/join" method="POST" class="join-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="Pick a username" required>
                    </div>
                    <input type="hidden" name="room" value="general">
                    <button type="submit" class="btn-chat-primary">Join Room</button>
                </form>
            </div>
        </div>

        <!-- Tab 2: Login Form for Registered Users -->
        <div id="tab-login" class="tab-content">
            <div class="join-section">
                <form id="login-form" class="join-form">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" placeholder="Your registered username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" placeholder="Your password" required>
                    </div>
                    <div id="login-error" class="form-error" style="display:none;"></div>
                    <button type="submit" class="btn-chat-primary">Login</button>
                </form>
            </div>
        </div>

        <!-- Tab 3: Register -->
        <div id="tab-register" class="tab-content">
            <div class="join-section">
                <p class="register-hint">Register to reserve your username.</p>
                <form id="register-form" class="join-form">
                    <div class="form-group">
                        <label for="reg-username">Username</label>
                        <input type="text" id="reg-username" placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label for="reg-password">Password</label>
                        <input type="password" id="reg-password" placeholder="Choose a password" required>
                    </div>
                    <div id="register-error" class="form-error" style="display:none;"></div>
                    <div id="register-success" class="form-success" style="display:none;"></div>
                    <button type="submit" class="btn-chat-secondary">Register</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ── Tab Switching ───────────────────────────────────────────────────
        const tabBtns = document.querySelectorAll(".tab-btn");
        const tabContents = document.querySelectorAll(".tab-content");

        tabBtns.forEach(function(btn) {
            btn.addEventListener("click", function() {
                const target = btn.getAttribute("data-tab");

                // Remove active from all tabs and content
                tabBtns.forEach(function(b) { b.classList.remove("active"); });
                tabContents.forEach(function(c) { c.classList.remove("active"); });

                // Activate clicked tab and its content
                btn.classList.add("active");
                document.getElementById("tab-" + target).classList.add("active");
            });
        });

        // ── Login Form Handler ──────────────────────────────────────────────
        document.getElementById("login-form").addEventListener("submit", function(e) {
            e.preventDefault();
            const username = document.getElementById("login-username").value.trim();
            const password = document.getElementById("login-password").value.trim();
            const errorDiv = document.getElementById("login-error");

            fetch("/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = "block";
                } else {
                    // Redirect to general room after login
                    window.location.href = "/chat/general";
                }
            });
        });

        // ── Register Form Handler ───────────────────────────────────────────
        document.getElementById("register-form").addEventListener("submit", function(e) {
            e.preventDefault();
            const username = document.getElementById("reg-username").value.trim();
            const password = document.getElementById("reg-password").value.trim();
            const errorDiv = document.getElementById("register-error");
            const successDiv = document.getElementById("register-success");

            fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username: username, password: password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    errorDiv.textContent = data.error;
                    errorDiv.style.display = "block";
                    successDiv.style.display = "none";
                } else {
                    successDiv.textContent = "Account created! Redirecting...";
                    successDiv.style.display = "block";
                    errorDiv.style.display = "none";
                    setTimeout(() => {
                        window.location.href = "/chat/general";
                    }, 1000);
                }
            });
        });
    </script>

</body>
</html>
