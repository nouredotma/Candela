<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candela — {{ room }}</title>
    <meta name="description" content="Chat in the {{ room }} room on Candela.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="chat-page">

    <!-- Main 3-column layout -->
    <div class="chat-layout">

        <!-- ── Left Sidebar: Room List (3/12) ──────────────────────────────── -->
        <aside class="sidebar sidebar-left">
            <div class="sidebar-logo">
                <span class="logo-text">Candela</span>
            </div>

            <button id="open-create-modal" class="btn-create-room">+ Create Room</button>
            
            <div class="sidebar-rooms-group">
                <div class="sidebar-section-title">Rooms</div>
                <ul id="room-list" class="room-list">
                    {% for r in rooms %}
                    <li class="room-item {% if r.name == room %}active{% endif %}">
                        <a href="/chat/{{ r.name }}"># {{ r.name }}</a>
                    </li>
                    {% endfor %}
                </ul>
            </div>

            <div class="sidebar-footer">
                <div class="user-profile" id="profile-trigger">
                    <div class="user-avatar">{{ username[0] | upper }}</div>
                    <span class="user-badge">{{ username }}</span>
                    <div id="profile-dropdown" class="profile-dropdown">
                        <a href="#" class="dropdown-item"><i class="bi bi-person me-2"></i> Profile</a>
                        <a href="/logout" class="dropdown-item logout"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- ── Center: Chat Area (6/12) ────────────────────────────────────── -->
        <main class="chat-center">
            <!-- Header -->
            <div class="chat-header">
                <div class="chat-header-info">
                    <h2># {{ room }}</h2>
                    <span id="online-count" class="online-count">0 online</span>
                </div>
            </div>

            <!-- Messages Feed -->
            <div id="messages-feed" class="messages-feed">
                <!-- Messages will be injected here by JS -->
            </div>

            <!-- Message Input Bar -->
            <div class="message-input-bar">
                <div class="input-row">
                    <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off">
                    <label for="image-upload" class="btn-attach" title="Attach image">📎</label>
                    <input type="file" id="image-upload" accept="image/*" style="display:none;">
                    <button id="send-btn" class="btn-send">Send</button>
                </div>
                <div id="image-preview" class="image-preview" style="display:none;">
                    <img id="preview-img" src="" alt="preview">
                    <button id="remove-image" class="btn-remove-image">✕</button>
                </div>
            </div>
        </main>

        <!-- ── Right Sidebar: Online Users (3/12) ─────────────────────────── -->
        <aside class="sidebar sidebar-right">
            <div class="chat-header">
                <div class="chat-header-info">
                    <h2>Online Users</h2>
                </div>
            </div>
            <ul id="online-users-list" class="online-users-list">
                <!-- Online users injected here by JS -->
            </ul>
        </aside>

    </div>

    <!-- ── Create Room Modal (Overlay) ──────────────────────────────────── -->
    <div id="create-modal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Room</h3>
                <button id="close-modal" class="btn-close">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="new-room-name">Room Name</label>
                    <input type="text" id="new-room-name" placeholder="e.g. coffee-break" autocomplete="off">
                </div>
                <div id="create-room-error" class="form-error" style="display:none;"></div>
                <button id="create-room-btn" class="btn-chat-primary">Create Room</button>
            </div>
        </div>
    </div>

    <!-- Pass data to JS -->
    <script>
        const CURRENT_ROOM = "{{ room }}";
        const CURRENT_USER = "{{ username }}";
    </script>
    <script src="{{ url_for('static', filename='chat.js') }}"></script>

</body>
</html>
